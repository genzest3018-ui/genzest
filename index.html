 <!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GENZEST | Finance, AI & Investing Insights</title>

  <meta name="description" content="GENZEST delivers modern finance, investing, AI, startup, and business insights with a clean premium experience.">

  <meta name="robots" content="index, follow">

  <meta property="og:title" content="GENZEST">
  <meta property="og:description" content="Finance, AI & Investing Insights">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://genzest.in/1779508386745.png">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="canonical" href="https://genzest.in/">

  <link rel="icon" type="image/png" href="1779508386745.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    :root{
      --bg-primary:#050505;
      --bg-surface:#0f0f11;
      --border-color:rgba(255,255,255,0.08);
      --text-primary:#ffffff;
      --text-secondary:#a1a1aa;
      --accent:#2563eb;
      --accent-hover:#3b82f6;
      --font-main:'Inter',sans-serif;
      --transition-smooth:all .3s cubic-bezier(.16,1,.3,1);
    }

    body.theme-light{
      --bg-primary:#f8fafc;
      --bg-surface:#ffffff;
      --border-color:rgba(0,0,0,.08);
      --text-primary:#0f172a;
      --text-secondary:#475569;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:var(--bg-primary);
      color:var(--text-primary);
      font-family:var(--font-main);
      overflow-x:hidden;
      transition:var(--transition-smooth);
    }

    /* NAVBAR */

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;

      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:1.2rem 5%;

      background:rgba(5,5,5,.7);
      backdrop-filter:blur(16px);

      border-bottom:1px solid var(--border-color);
    }

    .brand{
      text-decoration:none;
      color:var(--text-primary);
      font-size:1.7rem;
      font-weight:900;
      letter-spacing:-0.04em;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:2rem;
    }

    .nav-links a{
      color:var(--text-secondary);
      text-decoration:none;
      font-size:.95rem;
      font-weight:500;
      transition:.3s;
    }

    .nav-links a:hover{
      color:var(--text-primary);
    }

    .theme-toggle{
      background:var(--bg-surface);
      color:var(--text-primary);

      border:1px solid var(--border-color);

      padding:.7rem 1.3rem;
      border-radius:999px;

      cursor:pointer;

      transition:.3s;
    }

    .theme-toggle:hover{
      border-color:rgba(255,255,255,.2);
      transform:translateY(-2px);
    }

    /* MAIN */

    main{
      padding-top:5rem;
    }

    /* HERO */

    .hero{
      min-height:65vh;

      display:grid;
      grid-template-columns:1fr 1fr;
      align-items:center;

      gap:4rem;

      padding:5rem 5%;
    }

    .hero-content{
      max-width:620px;
    }

    .hero-mini{
      color:var(--accent);

      font-size:.8rem;
      font-weight:700;

      letter-spacing:.2em;

      margin-bottom:1.5rem;

      text-transform:uppercase;
    }

    .hero h1{
      font-size:clamp(3rem,7vw,5.5rem);

      line-height:1;
      letter-spacing:-0.05em;

      margin-bottom:2rem;

      font-weight:900;
    }

    .hero p{
      font-size:1.15rem;
      line-height:1.8;
      color:var(--text-secondary);

      max-width:520px;
    }

    .hero-image{
      width:100%;
      height:500px;

      border-radius:24px;

      object-fit:cover;

      border:1px solid var(--border-color);
    }

    /* FEATURED */

    .featured-section{
      padding:6rem 5%;

      border-top:1px solid var(--border-color);
    }

    .featured-section h2{
      font-size:clamp(2rem,5vw,3rem);

      margin-bottom:3rem;

      letter-spacing:-0.03em;
    }

    .featured-grid{
      display:grid;

      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));

      gap:2rem;
    }

    .featured-card{
      background:var(--bg-surface);

      border:1px solid var(--border-color);

      border-radius:20px;

      overflow:hidden;

      transition:.4s;
    }

    .featured-card:hover{
      transform:translateY(-8px);

      border-color:rgba(255,255,255,.15);

      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }

    .featured-card img{
      width:100%;
      height:240px;

      object-fit:cover;
    }

    .featured-content{
      padding:2rem;
    }

    .featured-content span{
      color:var(--accent);

      font-size:.75rem;
      font-weight:700;

      text-transform:uppercase;
    }

    .featured-content h3{
      font-size:1.5rem;

      margin:.8rem 0 1rem 0;

      line-height:1.3;
    }

    .featured-content p{
      color:var(--text-secondary);

      line-height:1.7;

      margin-bottom:1.5rem;
    }

    .featured-content a{
      color:var(--text-primary);

      text-decoration:none;

      font-weight:600;

      transition:.3s;
    }

    .featured-content a:hover{
      color:var(--accent);
    }

    /* MOBILE */

    @media(max-width:768px){

      .hero{
        grid-template-columns:1fr;
        gap:3rem;
      }

      .hero h1{
        font-size:4rem;
      }

      .nav-links{
        gap:1rem;
      }

      .featured-grid{
        grid-template-columns:1fr;
      }

      .hero-image{
        height:320px;
      }

    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <header class="topbar">

    <a href="/" class="brand">
      GENZEST
    </a>

    <nav class="nav-links">

      <a href="/">Home</a>

      <a href="javascript:void(0)"
      onclick="document.getElementById('featured').scrollIntoView({behavior:'smooth'})">
      Blog
      </a>

      <button id="themeToggle" class="theme-toggle">
        Theme
      </button>

    </nav>

  </header>

  <!-- MAIN -->

  <main>

    <!-- HERO -->

    <section class="hero">

      <div class="hero-content">

        <div class="hero-mini">
          MODERN FINANCE MEDIA
        </div>

        <h1>
          Future Of<br>
          Finance & AI
        </h1>

        <p>
          GENZEST delivers modern insights on investing,
          artificial intelligence, startups, business and
          future financial trends.
        </p>

      </div>

      <img
      class="hero-image"
      src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1200&auto=format&fit=crop"
      alt="GENZEST Hero Image">

    </section>

    <!-- BLOGS -->

    <section class="featured-section" id="featured">

      <h2>
        Featured Insights
      </h2>

      <div class="featured-grid" id="blogContainer">

        <div style="padding:40px;color:#888;">
          Loading GENZEST insights...
        </div>

      </div>

    </section>

  </main>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {

      apiKey:"AIzaSyAaBBRJWboc_TZ_Tf_e0c3uK0k57l64PP8",

      authDomain:"genzest-85233.firebaseapp.com",

      projectId:"genzest-85233",

      storageBucket:"genzest-85233.firebasestorage.app",

      messagingSenderId:"741928938",

      appId:"1:741928938:web:d55eb961c34732e73e4c93"
    };

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    async function loadBlogs(){

      const blogContainer =
      document.getElementById("blogContainer");

      try{

        const querySnapshot =
        await getDocs(collection(db,"posts"));

        blogContainer.innerHTML = "";

        querySnapshot.forEach((doc)=>{

          const post = doc.data();

          blogContainer.innerHTML += `

          <article class="featured-card">

            <img src="${post.image}" alt="${post.title}">

            <div class="featured-content">

              <span>${post.category}</span>

              <h3>${post.title}</h3>

              <p>${post.description}</p>

              <a href="blog.html?slug=${post.slug}">
                Read Article →
              </a>

            </div>

          </article>

          `;

        });

      }

      catch(error){

        blogContainer.innerHTML =
        "Unable to load insights right now.";

        console.error(error);

      }

    }

    /* THEME */

    const themeToggle =
    document.getElementById("themeToggle");

    themeToggle.addEventListener("click",()=>{

      document.body.classList.toggle("theme-light");

    });

    /* START */

    loadBlogs();

  </script>

</body>
</html>
