 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>GENZEST Article</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:'Inter',sans-serif;
      line-height:1.8;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:20px 5%;
      background:rgba(5,5,5,0.7);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      z-index:1000;
    }

    .brand{
      color:white;
      text-decoration:none;
      font-size:1.5rem;
      font-weight:800;
    }

    .article-container{
      width:90%;
      max-width:900px;
      margin:auto;
      padding:140px 0 80px;
    }

    .article-image{
      width:100%;
      height:420px;
      object-fit:cover;
      border-radius:20px;
      margin-bottom:40px;
    }

    .article-category{
      color:#3b82f6;
      font-size:0.85rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:20px;
    }

    .article-title{
      font-size:clamp(2.5rem,7vw,5rem);
      line-height:1.1;
      font-weight:900;
      margin-bottom:30px;
    }

    .article-description{
      font-size:1.3rem;
      color:#a1a1aa;
      margin-bottom:50px;
      line-height:1.7;
    }

    .article-content{
      font-size:1.08rem;
      color:#e5e5e5;
      white-space:pre-line;
      line-height:2;
    }

    .loading{
      text-align:center;
      padding-top:200px;
      font-size:1.2rem;
      color:#a1a1aa;
    }
  </style>
</head>

<body>

  <header class="topbar">
    <a href="/" class="brand">GENZEST</a>
  </header>

  <div id="app" class="loading">
    Loading article...
  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaBBRJWboc_TZ_Tf_e0c3uK0k57l64PP8",
      authDomain: "genzest-85233.firebaseapp.com",
      projectId: "genzest-85233",
      storageBucket: "genzest-85233.firebasestorage.app",
      messagingSenderId: "741928938",
      appId: "1:741928938:web:d55eb961c34732e73e4c93"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    async function loadArticle() {

      const appContainer = document.getElementById("app");

      try {

        const querySnapshot = await getDocs(collection(db, "posts"));

        let foundPost = null;

        querySnapshot.forEach((doc) => {

          const data = doc.data();

          if(data.slug === slug){
            foundPost = data;
          }

        });

        if(!foundPost){

          appContainer.innerHTML = `
            <div class="loading">
              Article not found.
            </div>
          `;

          return;
        }

        document.title = foundPost.title + " | GENZEST";

        appContainer.innerHTML = `

          <div class="article-container">

            <img
              class="article-image"
              src="${foundPost.image}"
              alt="${foundPost.title}"
            >

            <div class="article-category">
              ${foundPost.category}
            </div>

            <h1 class="article-title">
              ${foundPost.title}
            </h1>

            <p class="article-description">
              ${foundPost.description}
            </p>

            <div class="article-content">
              ${foundPost.content}
            </div>

          </div>

        `;

      } catch(error){

        console.error(error);

        appContainer.innerHTML = `
          <div class="loading">
            Failed to load article.
          </div>
        `;

      }

    }

    loadArticle();

  </script>

</body>
</html>
