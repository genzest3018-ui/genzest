 <!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GENZEST Article</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Caveat:wght@700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{

      --bg:#050505;

      --surface:#0f172a;

      --text:#ffffff;

      --text-secondary:#94a3b8;

      --accent:#3b82f6;

      --accent2:#a855f7;

      --border:rgba(255,255,255,0.08);

      --gradient:
      linear-gradient(
        135deg,
        #3b82f6,
        #8b5cf6,
        #ec4899
      );

    }

    body{

      background:var(--bg);

      color:var(--text);

      font-family:'Inter',sans-serif;

      overflow-x:hidden;

      line-height:1.9;

    }

    /* NAVBAR */

    .topbar{

      position:fixed;

      top:0;
      left:0;

      width:100%;

      padding:1rem 5%;

      display:flex;

      justify-content:space-between;

      align-items:center;

      background:rgba(5,5,5,0.78);

      backdrop-filter:blur(14px);

      border-bottom:1px solid var(--border);

      z-index:1000;

    }

    .brand{

      text-decoration:none;

      font-size:2rem;

      font-weight:900;

      background:var(--gradient);

      -webkit-background-clip:text;

      -webkit-text-fill-color:transparent;

      letter-spacing:-2px;

    }

    .back-link{

      color:var(--text-secondary);

      text-decoration:none;

      font-size:1rem;

      display:flex;

      align-items:center;

      gap:10px;

      transition:0.25s ease;

    }

    .back-link:hover{

      color:white;

    }

    /* MAIN */

    .article-wrap{

      width:92%;

      max-width:900px;

      margin:auto;

      padding:8rem 0 5rem;

    }

    /* IMAGE */

    .article-image{

      width:100%;

      height:420px;

      object-fit:cover;

      border-radius:30px;

      margin-bottom:3rem;

      box-shadow:
      0 20px 60px rgba(0,0,0,0.45);

      border:1px solid var(--border);

    }

    /* CATEGORY */

    .article-category{

      display:inline-block;

      margin-bottom:1rem;

      padding:0.5rem 1rem;

      border-radius:999px;

      background:rgba(59,130,246,0.12);

      color:#60a5fa;

      font-size:0.8rem;

      font-weight:700;

      letter-spacing:1px;

      text-transform:uppercase;

      border:1px solid rgba(59,130,246,0.15);

    }

    /* TITLE */

    .article-title{

      font-size:
      clamp(3rem,8vw,6rem);

      line-height:0.95;

      font-weight:900;

      letter-spacing:-4px;

      margin-bottom:2rem;

    }

    .gradient-text{

      display:block;

      background:var(--gradient);

      -webkit-background-clip:text;

      -webkit-text-fill-color:transparent;

    }

    .handwritten{

      display:block;

      font-family:'Caveat',cursive;

      font-size:0.9em;

      color:#60a5fa;

      text-shadow:
      0 0 18px rgba(96,165,250,0.45);

      margin:10px 0;

      letter-spacing:0;

      transform:rotate(-2deg);

    }

    /* DESCRIPTION */

    .article-description{

      font-size:1.35rem;

      color:var(--text-secondary);

      line-height:1.8;

      margin-bottom:4rem;

      max-width:780px;

    }

    /* CONTENT */

    .article-content{

      font-size:1.18rem;

      line-height:2.2;

      color:#e5e7eb;

    }

    .article-content p{

      margin-bottom:2rem;

    }

    /* GLASS EFFECT */

    .content-box{

      background:
      linear-gradient(
        180deg,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.01)
      );

      border:1px solid var(--border);

      border-radius:30px;

      padding:2.5rem;

      backdrop-filter:blur(12px);

    }

    /* LOADING */

    .loading{

      min-height:100vh;

      display:flex;

      align-items:center;

      justify-content:center;

      color:var(--text-secondary);

      font-size:1.2rem;

    }

    /* MOBILE */

    @media(max-width:768px){

      .article-wrap{

        width:90%;

        padding-top:7rem;

      }

      .article-image{

        height:260px;

        border-radius:22px;

      }

      .article-title{

        font-size:4rem;

        line-height:0.95;

        letter-spacing:-2px;

      }

      .article-description{

        font-size:1.08rem;

        margin-bottom:3rem;

      }

      .article-content{

        font-size:1.05rem;

        line-height:2;

      }

      .content-box{

        padding:1.6rem;

        border-radius:24px;

      }

    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <header class="topbar">

    <a href="/" class="brand">

      ⚡ GENZEST

    </a>

    <a href="/" class="back-link">

      <i class="fas fa-arrow-left"></i>

      Home

    </a>

  </header>

  <!-- APP -->

  <div id="app" class="loading">

    Loading article...

  </div>

  <!-- FIREBASE -->

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /* FIREBASE CONFIG */

    const firebaseConfig = {

      apiKey:"AIzaSyAaBBRJWboc_TZ_Tf_e0c3uK0k57l64PP8",

      authDomain:"genzest-85233.firebaseapp.com",

      projectId:"genzest-85233",

      storageBucket:"genzest-85233.firebasestorage.app",

      messagingSenderId:"741928938",

      appId:"1:741928938:web:d55eb961c34732e73e4c93"

    };

    const app =
    initializeApp(firebaseConfig);

    const db =
    getFirestore(app);

    /* GET SLUG */

    const params =
    new URLSearchParams(
      window.location.search
    );

    const slug =
    params.get("slug");

    /* LOAD ARTICLE */

    async function loadArticle(){

      const appContainer =
      document.getElementById("app");

      try{

        const querySnapshot =
        await getDocs(
          collection(db,"posts")
        );

        let foundPost = null;

        querySnapshot.forEach((doc)=>{

          const data = doc.data();

          if(data.slug === slug){

            foundPost = data;

          }

        });

        /* NOT FOUND */

        if(!foundPost){

          appContainer.innerHTML = `

            <div class="loading">

              Article not found.

            </div>

          `;

          return;

        }

        /* SEO TITLE */

        document.title =
        foundPost.title + " | GENZEST";

        /* SPLIT TITLE FOR EFFECT */

        const titleWords =
        foundPost.title.split(" ");

        const fancyTitle = `

          <span class="gradient-text">

            ${titleWords.slice(0,2).join(" ")}

          </span>

          <span class="handwritten">

            ${titleWords.slice(2,4).join(" ")}

          </span>

          <span class="gradient-text">

            ${titleWords.slice(4).join(" ")}

          </span>

        `;

        /* CONTENT PARAGRAPHS */

        const paragraphs =
        foundPost.content
        .split("\n")
        .filter(p => p.trim() !== "")
        .map(p => `<p>${p}</p>`)
        .join("");

        /* RENDER */

        appContainer.innerHTML = `

          <main class="article-wrap">

            <img
              src="${foundPost.image}"
              alt="${foundPost.title}"
              class="article-image"
            >

            <div class="article-category">

              ${foundPost.category || "Insights"}

            </div>

            <h1 class="article-title">

              ${fancyTitle}

            </h1>

            <p class="article-description">

              ${foundPost.description}

            </p>

            <div class="content-box">

              <div class="article-content">

                ${paragraphs}

              </div>

            </div>

          </main>

        `;

      }

      catch(error){

        console.error(error);

        appContainer.innerHTML = `

          <div class="loading">

            Failed to load article.

          </div>

        `;

      }

    }

    /* START */

    loadArticle();

  </script>

</body>

</html>
