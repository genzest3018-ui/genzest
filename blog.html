 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>GENZEST Article</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Caveat:wght@700&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#050505;

--surface:#0f172a;

--text:#ffffff;

--muted:#94a3b8;

--accent:#60a5fa;

--gradient:
linear-gradient(
135deg,
#3b82f6,
#8b5cf6,
#ec4899
);

}

body{

background:var(--bg);

color:var(--text);

font-family:'Inter',sans-serif;

line-height:1.9;

overflow-x:hidden;

}

/* NAV */

.topbar{

position:fixed;

top:0;
left:0;

width:100%;

padding:1rem 5%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(5,5,5,0.75);

backdrop-filter:blur(14px);

border-bottom:1px solid rgba(255,255,255,0.08);

z-index:1000;

}

.brand{

font-size:2rem;

font-weight:900;

text-decoration:none;

background:var(--gradient);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

/* ARTICLE */

.article-container{

width:90%;

max-width:950px;

margin:auto;

padding:120px 0 80px;

}

.article-image{

width:100%;

height:420px;

object-fit:cover;

border-radius:28px;

margin-bottom:40px;

box-shadow:
0 20px 50px rgba(0,0,0,0.45);

}

.article-category{

display:inline-block;

padding:0.5rem 1rem;

border-radius:999px;

background:rgba(59,130,246,0.15);

color:#60a5fa;

font-size:0.8rem;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

margin-bottom:25px;

}

/* TITLE */

.article-title{

font-size:clamp(3rem,10vw,6rem);

line-height:0.95;

font-weight:900;

margin-bottom:30px;

letter-spacing:-4px;

background:var(--gradient);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:
0 0 30px rgba(59,130,246,0.25);

}

.article-title span{

display:block;

font-family:'Caveat',cursive;

font-size:0.75em;

letter-spacing:0;

color:#60a5fa;

-webkit-text-fill-color:#60a5fa;

margin-top:10px;

}

/* DESCRIPTION */

.article-description{

font-size:1.35rem;

color:var(--muted);

margin-bottom:60px;

line-height:1.8;

}

/* CONTENT */

.article-content{

font-size:1.12rem;

color:#e2e8f0;

line-height:2.2;

background:rgba(15,23,42,0.55);

padding:2rem;

border-radius:24px;

border:1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(12px);

white-space:pre-line;

}

/* MOBILE */

@media(max-width:768px){

.article-image{

height:250px;

}

.article-title{

font-size:4rem;

line-height:0.95;

letter-spacing:-2px;

}

.article-description{

font-size:1.1rem;

}

.article-content{

font-size:1rem;

padding:1.4rem;

line-height:2;

}

}

.loading{

padding-top:220px;

text-align:center;

font-size:1.2rem;

color:var(--muted);

}

</style>

</head>

<body>

<header class="topbar">

<a
href="/"
class="brand"
>

⚡ GENZEST

</a>

</header>

<div
id="app"
class="loading"
>

Loading article...

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyAaBBRJWboc_TZ_Tf_e0c3uK0k57l64PP8",

authDomain:"genzest-85233.firebaseapp.com",

projectId:"genzest-85233",

storageBucket:"genzest-85233.firebasestorage.app",

messagingSenderId:"741928938",

appId:"1:741928938:web:d55eb961c34732e73e4c93"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* GET SLUG */

const params =
new URLSearchParams(
window.location.search
);

const slug =
params.get("slug");

/* LOAD ARTICLE */

async function loadArticle(){

const appContainer =
document.getElementById("app");

try{

const querySnapshot =
await getDocs(
collection(db,"posts")
);

let foundPost = null;

querySnapshot.forEach((doc)=>{

const data =
doc.data();

if(data.slug === slug){

foundPost = data;

}

});

if(!foundPost){

appContainer.innerHTML = `
<div class="loading">
Article not found.
</div>
`;

return;

}

document.title =
foundPost.title +
" | GENZEST";

appContainer.innerHTML = `

<div class="article-container">

<img
class="article-image"
src="${foundPost.image}"
alt="${foundPost.title}"
>

<div class="article-category">

${foundPost.category}

</div>

<h1 class="article-title">

${foundPost.title}

<span>

future finance insights

</span>

</h1>

<p class="article-description">

${foundPost.description}

</p>

<div class="article-content">

${foundPost.content}

</div>

</div>

`;

}

catch(error){

console.error(error);

appContainer.innerHTML = `
<div class="loading">
Failed to load article.
</div>
`;

}

}

loadArticle();

</script>

</body>
</html>
